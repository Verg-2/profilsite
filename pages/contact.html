<!DOCTYPE html>
<!-- HTML5 belgesi -->
<html lang="tr">
<head>
  <!-- Sayfa meta bilgileri -->
  <meta charset="UTF-8"> <!-- Türkçe karakter desteği -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mobil uyum -->
  <title>İletişim | Kadir</title>
  <link rel="stylesheet" href="../css/style.css"> <!-- Ana CSS dosyası -->
  
  <!-- Google Fonts: preconnect ile hızlı yükleme -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       İLETİŞİM SAYFASI ÖZEL STİLLERİ
       
       CSS Değişkenleri: Renk paletini tek yerden yönet.
       var(--isim) ile her yerde kullanılır.
       ============================================ */
    :root {
      --bg-primary: #0B0B0F;        /* Ana arka plan */
      --bg-card: #11111A;           /* Kart arka planı */
      --accent-primary: #FF3B1D;    /* Ateş kırmızısı */
      --accent-secondary: #FFB000;  /* Altın turuncu */
      --text-primary: #F4F6FF;      /* Ana yazı rengi */
      --text-muted: #8B8B9A;        /* Soluk yazı */
      --border: rgba(255, 255, 255, 0.08); /* Kenarlık */
    }

    /* ===== GENEL SAYFA STİLLERİ ===== */
    body {
      background: var(--bg-primary);       /* Koyu arka plan */
      color: var(--text-primary);          /* Açık yazı rengi */
      font-family: 'Inter', sans-serif;    /* Google yazı tipi */
    }

    /* ===== SAYFA BAŞLIĞI =====
       page-header: Üstte büyük başlık alanı.
       padding-top: 140px → navbar'ın altında kalmasın diye.
       ::before ile arkaya radial gradient efekti eklenir.
    */
    .page-header {
      padding: 140px 24px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* ::before → Sayfa başlığının arkasına ateş kırmızısı ışık efekti.
       pointer-events: none → Tıklamaları engellemesin. */
    .page-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 50% 30%, rgba(255, 59, 29, 0.2) 0%, transparent 50%);
      pointer-events: none;
    }

    /* clamp(min, tercih, max) → Ekrana göre boyut ayarlar.
       background-clip: text → Gradient'i yazının kendisine uygular. */
    .page-header h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .page-header p {
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
      font-size: 1.1rem;
      position: relative;
    }

    /* ===== İLETİŞİM FORMU ALANI =====
       Grid ile sol taraf (bilgiler) ve sağ taraf (form) yan yana.
       1fr 1.3fr: Sağ taraf (form) biraz daha geniş.
    */
    .contact-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
      display: grid;
      grid-template-columns: 1fr 1.3fr; /* Sol dar, sağ geniş */
      gap: 40px;
    }

    /* ===== İLETİŞİM KARTLARI =====
       Her iletişim bilgisi (email, telefon vs.) bir kartta gösterilir.
       flex-direction: column = Kartları alt alta dizer.
    */
    .contact-section {
      display: flex;
      flex-direction: column;     /* Dikey sıralama */
      gap: 5px;                  /* Kartlar arası boşluk */
    }

    /* 
       Tek bir iletişim kartı.
       ::before ile solda gradient çizgi oluşturulur.
       Hover'da sağa kayar ve çizgi görünür olur.
    */
    .contact-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    /* ::before → Kartın sol kenarında gradient çizgi.
       scaleY(0) = Normalde gizli, hover'da scaleY(1) ile görünür. */
    .contact-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
      transform: scaleY(0);           /* Başta gizli */
      transition: transform 0.3s ease;
    }

    /* Hover: Kart sağa kayar, kenarlık kırmızılaşır */
    .contact-card:hover {
      transform: translateX(8px);     /* 8px sağa kaydır */
      border-color: rgba(255, 59, 29, 0.3);
      background: rgba(255, 59, 29, 0.05);
    }

    /* Hover'da sol çizgi görünür */
    .contact-card:hover::before {
      transform: scaleY(1);           /* Çizgiyi göster */
    }

    /* İkon kutusu: Gradient arka planlı, küçük kare.
       flex-shrink: 0 → Daralmayı engeller (ikon boyutu sabit kalır). */
    .contact-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 14px;
      display: flex;
      align-items: center;    /* Dikey ortala */
      justify-content: center; /* Yatay ortala */
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    /* Kart içindeki başlık ve açıklama */
    .contact-info h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-info p {
      font-size: 0.9rem;
      color: var(--text-muted);  /* Soluk renk = ikincil bilgi */
    }

    /* ===== SOSYAL MEDYA LİNKLERİ =====
       GitHub, LinkedIn, Twitter ikonları. */
    .social-section {
      margin-top: 8px;
    }

    .social-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .social-links {
      display: flex;
      gap: 12px;
    }

    .social-link {
      width: 48px;
      height: 48px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    /* Hover: Kırmızı arka plan, yukarı zıplama, gölge */
    .social-link:hover {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: #fff;
      transform: translateY(-4px);   /* 4px yukarı kaldır */
      box-shadow: 0 10px 30px rgba(255, 59, 29, 0.3);
    }

    /* ===== FORM KARTI =====
       Sağ taraftaki mesaj gönderme formu.
       ::before ile kartın üstünde ince gradient çizgi. */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      position: relative;
    }

    /* Kartın üst kenarında yatay gradient çizgi.
       height: 3px → İnce bir çizgi. */
    .form-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 20px 20px 0 0;  /* Sadece üst köşeler yuvarlak */
    }

    .form-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    /* Input ve textarea ortak stilleri.
       font-family: inherit → Sayfanın yazı tipini kullan (Inter).
       transition → Odaklanma efekti için yumuşak geçiş. */
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-primary);    /* Koyu arka plan */
      border: 1px solid var(--border);  /* İnce kenarlık */
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;             /* Sayfadan miras al */
      transition: all 0.3s ease;
    }

    /* :focus → Input'a tıklanınca (odaklanma).
       outline: none → Tarayıcı varsayılan çerçevesini kaldır.
       box-shadow → Kırmızı parlama efekti (2 katman gölge). */
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(255, 59, 29, 0.15), 0 0 20px rgba(255, 59, 29, 0.1);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-muted);
    }

    /* ===== GÖNDER BUTONU =====
       Gradient arka plan + hover'da parlama efekti.
       ::before → Butonun üzerinden geçen ışık çizgisi (shine efekti). */
    .submit-btn {
      width: 100%;                /* Tam genişlik */
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--accent-primary), #FF5722);
      border: none;               /* Kenarlık yok */
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;            /* El işareti */
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;           /* ::before taşmasın */
    }

    /* Parlama efekti: Soldan sağa kayan beyaz çizgi.
       left: -100% → Başta görünmez (solda gizli).
       Hover'da left: 100% → Sağa kayarak geçer. */
    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;               /* Başlangıç: Gizli */
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    /* Hover: Buton yukarı kalkar, ateş gölgesi */
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 59, 29, 0.4);
    }

    /* Hover'da parlama çizgisi soldan sağa kayar */
    .submit-btn:hover::before {
      left: 100%;                /* Bitişe: Sağda kaybolur */
    }

    /* ===== ARKA PLAN ÇİZGİLERİ =====
       Sayfanın arkasında yukarıdan aşağıya akan ince çizgiler.
       CSS animasyonu ile sürekli hareket eder.
       pointer-events: none → Tıklamaları engelleme (arkada kal). */
    .bg-lines {
      position: fixed;           /* Ekrana sabit */
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;      /* Tıklamayı engelleme */
      z-index: 0;
      overflow: hidden;
    }

    /* Tek bir dikey çizgi.
       width: 1px → Çok ince çizgi.
       gradient → Ortada görünür, kenarlarda kaybolur. */
    .bg-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255, 59, 29, 0.3), transparent);
      animation: flowLine 8s linear infinite; /* 8 saniyede döngü */
    }

    /* nth-child → Her çizginin konumu ve gecikme süresi.
       left: farklı yüzdeler → Ekranda dağıtılmış çizgiler.
       Negatif delay → Animasyon farklı noktalardan başlar. */
    .bg-line:nth-child(1) { left: 15%; animation-delay: 0s; }
    .bg-line:nth-child(2) { left: 35%; animation-delay: -1.5s; }
    .bg-line:nth-child(3) { left: 55%; animation-delay: -3s; }
    .bg-line:nth-child(4) { left: 75%; animation-delay: -4.5s; }

    /* flowLine: Çizgi yukarıdan aşağıya akar.
       -100% → Ekranın üstünde (gizli) başlar.
       +100% → Ekranın altında (gizli) biter. */
    @keyframes flowLine {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    /* ===== NAVİGASYON ÇUBUĞU =====
       Sayfanın üstünde sabit duran menü.
       position: fixed → Kaydırınca da yerinde kalır.
       backdrop-filter: blur → Arkası bulanık cam efekti.
       z-index: 1000 → Her şeyin üstünde. */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      z-index: 1000;
      background: rgba(11, 11, 15, 0.9); /* Yarı saydam */
      backdrop-filter: blur(20px);       /* Cam efekti */
      border-bottom: 1px solid var(--border);
    }

    /* Navbar iç kapsayıcı: Logo solda, linkler sağda.
       max-width: 1200px → Çok geniş ekranda kenarlarda boşluk bırakır. */
    .navbar-inner {
      display: flex;
      align-items: center;           /* Dikey ortala */
      justify-content: space-between; /* İki uca dağıt */
      height: 100%;
      max-width: 1200px;
      margin: 0 auto;                /* Ortala */
      padding: 0 24px;
    }

    /* Logo: Gradient metinli "Kadir" yazısı.
       background-clip: text → Gradient'i yazıya uygular. */
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    /* Menü linkleri: Yatay sıralı, madde işaretsiz liste. */
    .nav-links {
      display: flex;
      gap: 32px;              /* Linkler arası boşluk */
      list-style: none;       /* Madde işaretini kaldır */
    }

    /* Link stili: Soluk renk, hover'da aydınlanır. */
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;  /* Alt çizgiyi kaldır */
      font-weight: 500;
      font-size: 0.9rem;
      transition: color 0.3s;
      position: relative;     /* ::after için gerekli */
    }

    /* ::after → Linkin altında genişleyen çizgi efekti.
       width: 0 → Normalde gizli.
       Hover'da width: 100% ile görünür. */
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;               /* Başta gizli */
      height: 2px;
      background: var(--accent-primary);
      transition: width 0.3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text-primary); /* Hover/aktif: Parlak renk */
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;            /* Alt çizgi görünür */
    }

    /* ===== MOBİL UYUM (RESPONSIVE) =====
       768px ve altı ekranlarda:
       - İletişim grid'i tek sütuna döner */
    @media (max-width: 768px) {
      .contact-container { grid-template-columns: 1fr; } /* Tek sütun */
    }
  </style>
</head>

      <h2 class="form-title">Mesaj Gönder</h2>
      
      <div class="form-group">
        <label for="name">Ad Soyad</label>
        <input type="text" id="name" placeholder="Adınızı girin" required>
      </div>

      <div class="form-group">
        <label for="email">E-posta</label>
        <input type="email" id="email" placeholder="E-posta adresiniz" required>
      </div>

      <div class="form-group">
        <label for="subject">Konu</label>
        <input type="text" id="subject" placeholder="Mesajın konusu" required>
      </div>

      <div class="form-group">
        <label for="message">Mesaj</label>
        <textarea id="message" placeholder="Mesajınızı yazın..." rows="5" required></textarea>
      </div>

      <button type="submit" class="submit-btn">Gönder</button>
    </form>
  </main>
  <!-- ===== JAVASCRIPT =====
       Bu script iletişim sayfasına özel 4 işlev içerir:
       1. Canvas dikey çizgi animasyonu
       2. Form gönderim işlemi
       3. Fade-in (scroll ile belirme) efekti
       4. Navbar scroll efekti -->
  <script>
    /* ===== 1. CANVAS - DİKEY ÇİZGİ ANİMASYONU =====
       Arka planda hafif turuncu dikey çizgiler çizer.
       Çizgiler sinüs dalgasıyla hafifçe sallanır. */
    
    // Canvas elemanını al ve 2D çizim bağlamını oluştur
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d'); // 2D çizim API'si
    
    // resize: Canvas boyutunu pencere boyutuna eşitler.
    // Bu yapılmazsa canvas bulanık veya eksik görünür.
    function resize() {
      canvas.width = window.innerWidth;   // Pencere genişliği
      canvas.height = window.innerHeight; // Pencere yüksekliği
    }
    resize(); // Sayfa açılınca bir kez çalıştır
    window.addEventListener('resize', resize); // Pencere boyutu değişince tekrar çalıştır
    
    // 8 tane rastgele dikey çizgi oluştur.
    // Her çizginin: x konumu, hızı, uzunluğu ve saydamlığı var.
    const lines = [];
    for (let i = 0; i < 8; i++) {
      lines.push({
        x: Math.random() * canvas.width,        // Rastgele yatay konum
        speedY: Math.random() * 2 + 1,          // Dikey hız (1-3 arası)
        length: Math.random() * 100 + 50,        // Çizgi uzunluğu (50-150)
        opacity: Math.random() * 0.3 + 0.1       // Saydamlık (0.1-0.4)
      });
    }
    
    // Ana animasyon döngüsü: Her kare (frame) için çağrılır (~60 fps).
    function animate() {
      // Önceki kareyi temizle (her şeyi sil)
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 'lighter' modu: Üst üste binen renkler daha parlak olur (ateş efekti)
      ctx.globalCompositeOperation = 'lighter';
      
      // Her çizgiyi çiz
      lines.forEach(line => {
        // Sin dalgasıyla çizgiyi sağa-sola salla
        // Date.now() = Şu anki zaman (milisaniye) → sürekli değişir
        line.x += Math.sin(Date.now() * 0.001) * 0.2;
        
        // Dikey gradient: Üst ve alt şeffaf, ortası turuncu
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, 'transparent');                          // Üst: Şeffaf
        gradient.addColorStop(0.5, `rgba(255, 100, 0, ${line.opacity})`); // Orta: Turuncu
        gradient.addColorStop(1, 'transparent');                          // Alt: Şeffaf
        
        // Çizgiyi çiz
        ctx.strokeStyle = gradient;  // Çizgi rengi = gradient
        ctx.lineWidth = 1;           // Çizgi kalınlığı
        ctx.beginPath();             // Yeni yol başlat
        ctx.moveTo(line.x, 0);      // Üstten başla
        ctx.lineTo(line.x + 20, canvas.height); // 20px sağa eğik, alta
        ctx.stroke();                // Çizgiyi ekrana bas
      });
      
      // Normal karıştırma moduna dön
      ctx.globalCompositeOperation = 'source-over';
      
      // Bir sonraki kareyi çiz (sonsuz döngü)
      requestAnimationFrame(animate);
    }
    animate(); // Animasyonu başlat
    
    /* ===== 2. FORM GÖNDERİMİ =====
       Form submit olayını yakala, sayfanın yenilenmesini engelle.
       e.preventDefault() → Formun gerçekten gönderilmesini durdurur.
       form.reset() → Tüm alanları temizler. */
    const form = document.getElementById('contact-form');
    form.addEventListener('submit', (e) => {
      e.preventDefault(); // Sayfa yenilenmesin
      const name = document.getElementById('name').value;
      alert('Teşekkürler ' + name + '! Mesajınız gönderildi. 🎉');
      form.reset(); // Formu temizle
    });
    
    /* ===== 3. FADE-IN (SCROLL BELİRME) =====
       IntersectionObserver: Element ekranda göründüğünde tetiklenir.
       threshold: 0.1 → Elementin %10'u göründüğünde çalışır.
       'visible' sınıfı eklenince CSS transition ile belirir.
       unobserve → Bir kez belirdikten sonra artık izleme. */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {        // Ekranda mı?
          entry.target.classList.add('visible'); // CSS efekti tetikle
          observer.unobserve(entry.target);      // Artık izleme
        }
      });
    }, { threshold: 0.1 }); // %10 görününce tetikle
    
    // Tüm fade-in elementlerini izlemeye al
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    
    /* ===== 4. NAVBAR SCROLL EFEKTİ =====
       Sayfa aşağı kaydırıldığında navbar daha koyu olur.
       scrollY > 50 → 50px'den fazla kaydırıldıysa daha opak yap. */
    window.addEventListener('scroll', () => {
      const navbar = document.querySelector('.navbar');
      navbar.style.background = window.scrollY > 50 ? 
        'rgba(11, 11, 15, 0.98)' :  // Kaydırılmış: Daha koyu
        'rgba(11, 11, 15, 0.9)';     // Üstte: Daha saydam
    });
  </script>
</body>
</html>
